<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- WebSite Schema: tells Google the website name is "Glasspay" -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Glasspay",
      "url": "https://glasspay.app"
    }
    </script>

    <!-- SEO -->
    <title>Glasspay — Community Finance Crystal Clear</title>
    <meta
      name="description"
      content="Glasspay saves communities 15–20 hours monthly chasing payments. The transparent way for Nigerian associations, clubs, and schools to manage funds."
    />
    <meta
      name="keywords"
      content="community finance Nigeria, dues collection app, payment management Nigeria, associations fintech, clubs payment Nigeria"
    />
    <link rel="canonical" href="https://glasspay.app" />

    <!-- Open Graph -->
    <meta property="og:title" content="Glasspay — Community Finance App Nigeria" />
    <meta
      property="og:description"
      content="Glasspay — the transparent way for Nigerian associations, clubs, and schools to manage funds. Save 15–20 hours monthly."
    />
    <meta property="og:url" content="https://glasspay.app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://glasspay.app/og-image.png" />
    <meta property="og:site_name" content="Glasspay" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Glasspay — Community Finance App Nigeria" />
    <meta
      name="twitter:description"
      content="Glasspay automates dues collection for Nigerian communities. Crystal clear finance."
    />
    <meta name="twitter:image" content="https://glasspay.app/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
